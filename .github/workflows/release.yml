name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d ' \n\r' < .claude-wyvrn/VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "tag $GITHUB_REF_NAME (=$tag) does not match .claude-wyvrn/VERSION ($file)" >&2
            exit 1
          fi
          echo "VERSION=$file" >> "$GITHUB_ENV"

      - name: Stage release payload
        run: |
          set -euo pipefail
          mkdir -p stage/.skeleton
          cp -R .claude-wyvrn        stage/.claude-wyvrn
          cp -R .claude-wyvrn-local  stage/.skeleton/.claude-wyvrn-local
          cp    CLAUDE.md            stage/.skeleton/CLAUDE.md

      - name: Build archives
        run: |
          set -euo pipefail
          ( cd stage && tar -czf ../claude-wyvrn.tar.gz . )
          ( cd stage && zip -qr   ../claude-wyvrn.zip    . )

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          sha256sum claude-wyvrn.tar.gz claude-wyvrn.zip install.sh install.ps1 > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "v${VERSION}" \
            --generate-notes \
            claude-wyvrn.tar.gz \
            claude-wyvrn.zip \
            install.sh \
            install.ps1 \
            SHA256SUMS
